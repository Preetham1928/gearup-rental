services:
  postgres:
    image: postgres:16-alpine
    container_name: rentforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rentforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rentforge-net

  mongo:
    image: mongo:6
    container_name: rentforge-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.runCommand('ping').ok"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - rentforge-net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    container_name: rentforge-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: super_secure_jwt_secret_change_me_in_prod
      JWT_EXPIRES_IN: 7d
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_DATABASE: rentforge
      MONGO_URI: mongodb://mongo:27017/rentforge
      CLIENT_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
    volumes:
      - backend_logs:/app/logs
    networks:
      - rentforge-net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: rentforge-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - rentforge-net

  prometheus:
    image: prom/prometheus:latest
    container_name: rentforge-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - rentforge-net

  grafana:
    image: grafana/grafana:latest
    container_name: rentforge-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - rentforge-net

volumes:
  postgres_data:
  mongo_data:
  backend_logs:
  grafana_data:

networks:
  rentforge-net:
    driver: bridge